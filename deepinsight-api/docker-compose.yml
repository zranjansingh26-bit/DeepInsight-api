version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepinsight-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - HOST=0.0.0.0
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app  # Mount for development hot-reload
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: deepinsight-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepinsight-worker
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    command: celery -A worker.celery_app worker --loglevel=info
    restart: unless-stopped
    depends_on:
      - redis
      - api

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepinsight-beat
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    command: celery -A worker.celery_app beat --loglevel=info
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  redis_data:
